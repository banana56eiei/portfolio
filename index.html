<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio นายวาสนา</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            /* ตั้งค่ารูปภาพพื้นหลังให้เต็มหน้าจอพอดี */
            background-image: url('imgs/isewtweetbg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            text-align: center;
            padding: 50px;
            display: flex;
            flex-direction: column; /* เปลี่ยนเป็น column เพื่อให้รูปโปรไฟล์อยู่ด้านบนการ์ด */
            justify-content: center;
            align-items: center;
            min-height: 85vh;
            margin: 0;
        }
        
        /* ปรับแต่งรูปภาพโปรไฟล์ */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* ทำเป็นวงกลม */
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.5);
        }
        
        .profile-card {
            /* พื้นหลังการ์ดแบบกระจกโปร่งแสง (Glassmorphism) */
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            padding: 40px 30px;
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }
        
        h1 {
            color: #ffffff; 
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); 
            margin-bottom: 15px;
            font-size: 28px;
        }
        
        p {
            color: #f5f5f5; 
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            font-size: 18px;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    
    <img src="imges/berserk-guts-berserker-armor-4k-wallpaper-card.jpg" alt="berserk-guts-berserker-armor-4k-wallpaper-card.jpg" class="profile-img">

    <div class="profile-card">
        <h1>นายวาสนา โสประโคน</h1>
        <p>นักเรียนชั้นม.6/6</p>
        <p>โรงเรียนพานทอง</p>
    </div>

</body>
</html>
