<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio นายวาสนา</title>
    <style>
        body {
            background-color: #FF0000;
            color: #FFFFFF; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center; 
            padding: 50px 20px;
            margin: 0;
        }
        .profile-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid #FFFFFF; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.3); /* เพิ่มเงาให้รูปดูมีมิติ */
        }
        h1 {
            font-size: 2.5rem;
            margin-top: 20px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* เพิ่มเงาให้ข้อความอ่านง่ายขึ้น */
        }
        /* ทำลิงก์ให้เป็นปุ่มกดสวย ๆ */
        .btn-link {
            display: inline-block;
            background-color: #FFFFFF;
            color: #FF0000;
            text-decoration: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.2s ease-in-out;
        }
        /* เวลาเอาเมาส์ไปชี้ ให้ปุ่มขยายขึ้นนิดนึง */
        .btn-link:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <img src="images/Website_Blog_creatives_29_1600x.webp" alt="รูปโปรไฟล์" class="profile-img">

    <h1>หน้าหลัก</h1>
    
    <!-- เปลี่ยนจากข้อความธรรมดาให้เป็นปุ่มกด (แก้ชื่อไฟล์ให้ตรงกับไฟล์ประวัติของคุณด้วยนะครับ) -->
    <a href="profile.html" class="btn-link">👉 คลิกดูประวัติส่วนตัว</a>

</body>
</html>
