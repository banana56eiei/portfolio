
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio นายวาสนา</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            /* ใส่รูปภาพพื้นหลัง และตั้งค่าให้แสดงเต็มหน้าจอ ไม่ซ้ำ */
            background-image: url('imgs/berserk-guts-berserker-armor-4k-wallpaper-card.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            text-align: center;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
            margin: 0;
        }
        
        .profile-card {
            /* ปรับพื้นหลังการ์ดเป็นแบบโปร่งแสงสไตล์กระจก (Glassmorphism) เพื่อให้เข้ากับธีมมืด */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            padding: 40px 30px;
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 400px;
            width: 100%;
        }
        
        h1 {
            color: #ffffff; /* เปลี่ยนเป็นสีขาวเพื่อให้เด่นขึ้นมา */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6); /* เพิ่มเงาให้ข้อความอ่านง่ายขึ้น */
            margin-bottom: 15px;
        }
        
        p {
            color: #e0e0e0; /* เปลี่ยนเป็นสีเทาอ่อนเพื่อให้เข้ากับธีม */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            font-size: 18px;
            margin: 8px 0;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>นายวาสนา โสประโคน</h1>
        <p>นักเรียนชั้นม.6/6</p>
        <p>โรงเรียนพานทอง</p>
    </div>

</body>
</html>
